<svg xmlns="http://www.w3.org/2000/svg" width="140" height="38" viewBox="0 0 140 38">
<foreignObject width="100%" height="100%">
<div xmlns="http://www.w3.org/1999/xhtml">
<style>
*{margin:0;padding:0;box-sizing:border-box}
.badge{width:140px;height:38px;background:#0b0c0b;border:1px solid #1a2a24;border-radius:4px;display:flex;align-items:center;justify-content:center;flex-direction:row;gap:6px;position:relative;overflow:hidden;font-family:ui-monospace,'SF Mono','Fira Mono',monospace;}
.badge::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,#fbbf24,transparent);}
.inner{display:flex;align-items:center;gap:6px;}
.icon{flex-shrink:0;opacity:.85;}
.label{font-size:11px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:#fbbf24;position:relative;user-select:none;}
.label::before,.label::after{content:'SPONSOR';position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;}
.label::before{color:#ff3366;mix-blend-mode:screen;}.label::after{color:#33ffee;mix-blend-mode:screen;}
.sublabel{font-size:9px;letter-spacing:.18em;color:#c8ccca;opacity:.45;text-transform:uppercase;line-height:1;}
.scan{position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(31,232,168,.016) 3px,rgba(31,232,168,.016) 4px);pointer-events:none;}
.br{position:absolute;width:6px;height:6px;border-color:#fbbf24;border-style:solid;opacity:.3;}
.br-tl{top:4px;left:4px;border-width:1px 0 0 1px;}.br-tr{top:4px;right:4px;border-width:1px 1px 0 0;}
.br-bl{bottom:4px;left:4px;border-width:0 0 1px 1px;}.br-br{bottom:4px;right:4px;border-width:0 1px 1px 0;}
</style>
<div class="badge">
  <div class="scan"></div>
  <div class="br br-tl"></div><div class="br br-tr"></div>
  <div class="br br-bl"></div><div class="br br-br"></div>
  <div class="inner">
  <svg class="icon" viewBox="0 0 16 16" width="14" height="14" fill="none" stroke="#fbbf24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M8 2L9.8 6.2 14.5 6.5 11 9.5 12.1 14 8 11.5 3.9 14 5 9.5 1.5 6.5 6.2 6.2Z"/></svg>
    <span class="label">SPONSOR</span>
  </div>
</div>
</div>
</foreignObject>
</svg>