name: Publish to PyPI

on:
  release:
    types: [released]  # triggers only when a non-prerelease GitHub release is published
  workflow_dispatch:

permissions:
  contents: read
  id-token: write   # for trusted publishing

jobs:
  publish-pypi:
    name: Build & publish glitch-badges to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/glitch-badges
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist + wheel
        working-directory: packages/py
        run: |
          cp ../../README.md README.md
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/py/dist/
          password: ${{ secrets.PYPI_REGISTRY_TOKEN }}
